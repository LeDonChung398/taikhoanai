# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name taikhoanai.top www.taikhoanai.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://taikhoanai.top$request_uri;
    }
}

server {
    listen 80;
    server_name api.taikhoanai.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend (taikhoanai.top)
server {
    listen 443 ssl;
    server_name taikhoanai.top www.taikhoanai.top;

    ssl_certificate     /etc/letsencrypt/live/taikhoanai.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taikhoanai.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS — Backend API (api.taikhoanai.top)
server {
    listen 443 ssl;
    server_name api.taikhoanai.top;

    ssl_certificate     /etc/letsencrypt/live/taikhoanai.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taikhoanai.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
