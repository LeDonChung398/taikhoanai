version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taikhoanai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-taikhoanai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taikhoanai-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env            # DB_NAME, DB_USERNAME, DB_PASSWORD, DB_PORT, DB_SYNC
      - ./backend/.env  # PORT, JWT, R2, CORS, ADMIN
    environment:
      DB_HOST: postgres  # override localhost -> tên service Docker
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: taikhoanai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # nginx:
